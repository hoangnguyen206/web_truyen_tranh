<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MangaFlow — Đọc Truyện Tranh Online</title>
    <meta name="description" content="MangaFlow - Đọc truyện tranh online miễn phí, cập nhật nhanh nhất. Manga, Manhwa, Manhua chất lượng cao."/>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Epilogue:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/assets/js/tailwind-config.js"></script>
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        /* ===== BẢNG MÀU TỐI (DARK MODE) HOÀN CHỈNH (CSS VARIABLES - WCAG 2.1 AA) ===== */
        html.dark {
            --bg-main: #121212;      /* Nền chính: Slate Gray tối, dịu mắt */
            --bg-card: #1F2937;      /* Thẻ chương/Card: Gray-800, không bị gắt */
            --text-main: #F3F4F6;    /* Văn bản chung: Sáng hơn (Gray-100) */
            --text-muted: #D1D5DB;   /* Văn bản phụ/Label: Gray-300 */
            --border-color: #374151; /* Viền tối mỏng */
            color-scheme: dark;
        }

        html.dark body,
        html.dark .bg-background,
        html.dark .bg-surface-bright,
        html.dark .dark\:bg-zinc-950 {
            background-color: var(--bg-main) !important;
            color: var(--text-main) !important;
        }

        /* Thẻ Chương, Dropdown & Card chung */
        html.dark .bg-white,
        html.dark .bg-surface,
        html.dark .bg-surface-container-low,
        html.dark .bg-surface-container-high,
        html.dark .bg-surface-container-highest,
        html.dark .bg-surface-container-lowest,
        html.dark .dark\:bg-zinc-900,
        html.dark .dark\:bg-zinc-800,
        html.dark .dark\:bg-zinc-800\/95,
        html.dark .bg-zinc-100,
        html.dark .bg-zinc-50 {
            background-color: var(--bg-card) !important;
        }

        /* Active Chapter Card */
        html.dark .bg-primary-fixed-dim\/20 {
            background-color: #374151 !important;
            border-color: #e11d48 !important; /* Đỏ để làm nổi bật nhẹ */
        }

        /* Hover Cards */
        html.dark .hover\:bg-zinc-200:hover,
        html.dark .hover\:bg-zinc-700:hover,
        html.dark .group:hover .bg-surface {
            background-color: #374151 !important;
        }

        /* Tăng độ sáng Văn bản chung (Tiêu đề, Text chính) */
        html.dark .text-zinc-900,
        html.dark .text-zinc-800,
        html.dark .text-zinc-700,
        html.dark .text-on-background,
        html.dark .text-on-surface,
        html.dark .dark\:text-white {
            color: var(--text-main) !important;
        }

        /* Tăng độ sáng Văn bản phụ / Label / Lượt xem / Ngày đăng */
        html.dark .text-zinc-600,
        html.dark .text-zinc-500,
        html.dark .text-secondary,
        html.dark .text-on-surface-variant,
        html.dark .dark\:text-zinc-500,
        html.dark .dark\:text-zinc-400,
        html.dark .dark\:text-zinc-300 {
            color: var(--text-muted) !important;
        }

        /* Borders */
        html.dark .border-outline-variant,
        html.dark .dark\:border-zinc-700,
        html.dark .border-zinc-200,
        html.dark .border-zinc-100 {
            border-color: var(--border-color) !important;
        }

        /* Smooth transitions */
        body, header, nav, main, section, div, a, p, h1, h2, h3, span, button, input, select {
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        /* Genre dropdown styles */
        .genre-dropdown {
            position: relative;
        }
        .genre-dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            max-height: 420px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(8px);
            transition: all 0.2s ease;
            z-index: 100;
        }
        .genre-dropdown:hover .genre-dropdown-menu,
        .genre-dropdown-menu:hover {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        .genre-dropdown-menu::-webkit-scrollbar {
            width: 6px;
        }
        .genre-dropdown-menu::-webkit-scrollbar-track {
            background: transparent;
        }
        .genre-dropdown-menu::-webkit-scrollbar-thumb {
            background: #d4d4d8;
            border-radius: 3px;
        }
        html.dark .genre-dropdown-menu::-webkit-scrollbar-thumb {
            background: #3f3f46;
        }

        /* Pagination button styling */
        .pagination-btn {
            min-width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        .pagination-btn.active {
            background: #e11d48;
            color: white;
        }
        .pagination-btn:not(.active) {
            background: #f4f4f5;
            color: #52525b;
        }
        html.dark .pagination-btn:not(.active) {
            background: #27272a;
            color: #a1a1aa;
        }
        .pagination-btn:not(.active):hover {
            background: #e4e4e7;
        }
        html.dark .pagination-btn:not(.active):hover {
            background: #3f3f46;
        }

        /* Tab button styling for ranking */
        .rank-tab {
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .rank-tab.active {
            background: #e11d48;
            color: white;
            border-color: #e11d48;
        }
        .rank-tab:not(.active) {
            background: #f4f4f5;
            color: #52525b;
            border-color: #e4e4e7;
        }
        html.dark .rank-tab:not(.active) {
            background: #27272a;
            color: #a1a1aa;
            border-color: #3f3f46;
        }
        .rank-tab:not(.active):hover {
            border-color: #f43f5e;
            color: #f43f5e;
        }

        /* Auth tab */
        .auth-tab {
            padding: 10px 24px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            color: #71717a;
        }
        .auth-tab.active {
            color: #e11d48;
            border-bottom-color: #e11d48;
        }
    </style>
    <script>
        // Restore dark mode preference before paint
        if (localStorage.getItem('mangaflow_dark') === 'true') {
            document.documentElement.classList.replace('light', 'dark');
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen antialiased selection:bg-primary-container selection:text-on-primary-container">
    
    <!-- Navbar Container -->
    <div id="navbar-container"></div>
    
    <!-- Main App Container -->
    <div id="app-container" class="pb-16 md:pb-0"></div>
    
    <!-- Footer Container -->
    <div id="footer-container"></div>
    
    <!-- Bottom Nav Container (Mobile) -->
    <div id="bottom-nav-container"></div>

    <!-- Application Script -->
    <script type="module" src="/assets/js/app.js"></script>
</body>
</html>
